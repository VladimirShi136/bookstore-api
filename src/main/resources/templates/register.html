<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="vladimir_shi">
    <meta name="created" content="2026-04-19">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Единообразное поведение кнопок при наведении - все затемняются */
        .btn:hover {
            filter: brightness(0.85);
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Регистрация</h3>
                </div>
                <div class="card-body">
                    <!-- Сообщение об ошибке -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}">
                    </div>

                    <!-- Сообщение об успешной регистрации -->
                    <div th:if="${param.registered}" class="alert alert-success">
                        Регистрация прошла успешно! Теперь вы можете войти.
                    </div>

                    <form th:action="@{/register}" method="post" th:object="${user}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Имя пользователя</label>
                            <input type="text" class="form-control" id="username" th:field="*{username}" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                    </form>

                    <div class="mt-3 text-center">
                        <span>Уже есть аккаунт? </span>
                        <a th:href="@{/login}" class="text-decoration-none">Войти</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
