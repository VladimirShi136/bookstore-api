<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="vladimir_shi">
    <meta name="created" content="2026-04-19">
    <title>Список книг</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Единообразное поведение кнопок при наведении - все затемняются */
        .btn:hover {
            filter: brightness(0.85);
        }
        .btn-info:hover, .btn-warning:hover {
            /* Отменяем стандартное осветление Bootstrap */
            filter: brightness(0.85);
        }
        /* Фиксированная высота строк таблицы */
        .table tbody tr {
            height: 60px;
            vertical-align: middle;
        }
        .table tbody td {
            vertical-align: middle;
            text-align: center;
        }
        .table thead th {
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <!-- Уведомление об успешном входе -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">Операция успешна!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Информация о пользователе -->
    <div class="alert alert-info d-flex justify-content-between align-items-center mb-4">
        <div>
            <strong>Пользователь:</strong>
            <span sec:authentication="name"></span>
            <span class="ms-3"><strong>Роль:</strong>
            <span sec:authentication="authorities[0]"></span></span>
            <span class="ms-3"><small class="text-muted">Вход: <span
                    th:text="${#dates.format(currentTime, 'dd.MM.yyyy HH:mm')}"></span></small></span>
        </div>
        <div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger">
                    🚪 Выход
                </button>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Список книг</h1>
        <div class="d-flex gap-2">
            <div sec:authorize="hasAnyRole('USER', 'EDITOR', 'ADMIN')">
                <a href="/books/add" class="btn btn-primary">Добавить книгу</a>
            </div>
            <a th:href="@{/my-books}" class="btn btn-info">📚 Мои книги</a>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>№</th>
            <th>Название</th>
            <th>Автор</th>
            <th>Год издания</th>
            <th>Владелец</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book, iterStat : ${books}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.publicationYear}"></td>
            <td th:text="${book.owner != null ? book.owner.username : 'Нет владельца'}"></td>
            <td>
                <div class="d-flex gap-2 justify-content-center">
                    <!-- Редактировать: владелец или EDITOR/ADMIN -->
                    <a th:if="${book.owner != null && book.owner.username == #authentication.name
                           || #authorization.expression('hasAnyRole(''EDITOR'',''ADMIN'')')}"
                       th:href="@{/books/edit/{id}(id=${book.id})}"
                       class="btn btn-warning">Редактировать</a>

                    <!-- Удалить: владелец или ADMIN (EDITOR не может удалять чужие) -->
                    <form th:if="${book.owner != null && book.owner.username == #authentication.name
                           || #authorization.expression('hasRole(''ADMIN'')')}"
                          th:action="@{/books/delete/{id}(id=${book.id})}"
                          method="post">
                        <button type="submit" class="btn btn-danger"
                                onclick="return confirm('Вы уверены, что хотите удалить эту книгу?')">Удалить
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
