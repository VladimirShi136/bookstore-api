<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="vladimir_shi">
    <meta name="created" content="2026-04-19">
    <title>Мои книги</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Единообразное поведение кнопок при наведении - все затемняются */
        .btn:hover {
            filter: brightness(0.85);
        }
        /* Фиксированная высота строк таблицы */
        .table tbody tr {
            height: 60px;
            vertical-align: middle;
        }
        .table tbody td {
            vertical-align: middle;
            text-align: center;
        }
        .table thead th {
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <!-- Информация о пользователе -->
    <div class="alert alert-info d-flex justify-content-between align-items-center mb-4">
        <div>
            <strong>Пользователь:</strong>
            <span sec:authentication="name"></span>
            <span class="ms-3"><strong>Роль:</strong>
            <span sec:authentication="authorities[0]"></span></span>
            <span class="ms-3"><small class="text-muted">Вход: <span th:text="${#dates.format(currentTime, 'dd.MM.yyyy HH:mm')}"></span></small></span>
        </div>
        <div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger">🚪 Выход</button>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📚 Мои книги</h1>
        <div>
            <a th:href="@{/books}" class="btn btn-secondary">← Все книги</a>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>№</th>
            <th>Название</th>
            <th>Автор</th>
            <th>Год издания</th>
            <th>Владелец</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book, iterStat : ${books}">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.publicationYear}"></td>
            <td th:text="${book.owner != null ? book.owner.username : 'Нет владельца'}"></td>
            <td>
                <div class="d-flex gap-2 justify-content-center">
                    <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-warning">Редактировать</a>
                    <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Удалить книгу?')">Удалить</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Сообщение если книг нет -->
    <div th:if="${#lists.isEmpty(books)}" class="alert alert-warning text-center">
        У вас пока нет добавленных книг
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
